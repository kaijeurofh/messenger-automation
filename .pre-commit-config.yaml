# Optional. Enable with:
#   uv run pre-commit install
# Or run once across the whole repo with:
#   uv run pre-commit run --all-files
#
# Each `rev:` is pinned to a full commit SHA, with the human-readable tag
# in a trailing comment — same supply-chain hygiene as the SHA-pinned
# `uses:` lines in `.github/workflows/*.yml`. A mutable tag could be
# re-pointed by a compromised maintainer account and silently execute
# attacker code on every contributor's `git commit`. Bump with:
#
#   uv run pre-commit autoupdate --freeze

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 6fec9b7edb08fd9989088709d864a7826dc74e80  # frozen: v0.15.12
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: 6eaad039603a4de39fddd1cf5f727391efe9974e  # frozen: v8.30.0
    hooks:
      - id: gitleaks
