name: OpenSSF Scorecard

# Runs OpenSSF Scorecard against this repository on a schedule and on pushes
# to `main`. Scorecard scores best-practice signals (branch protection, pinned
# dependencies, signed releases, code-review coverage, …) and uploads its
# findings as a SARIF file to GitHub's Code Scanning UI.
#
# Design choices:
#
# 1. **Non-blocking by default.** This workflow does NOT run on `pull_request`,
#    so a failing or low Scorecard score never gates a merge. Findings still
#    surface in the *Files changed* tab of a PR via Code Scanning annotations,
#    which gives both humans *and* the agent reading PR feedback a chance to
#    learn from the violation without bricking the merge. Teams that want it
#    blocking can add it to Branch Protection's required status checks after
#    they have a steady-state score.
# 2. **Pinned by SHA.** Same supply-chain hygiene as `ci.yml`; the comment
#    above each `uses:` line records the human-readable tag.
# 3. **`publish_results: true`** publishes the score to https://scorecard.dev/
#    so downstream consumers (and the Scorecard badge in the README) can read
#    it without a logged-in GitHub session.
#
# A GitHub template repository copies *files* but not *settings*. Several
# Scorecard checks (Branch-Protection, Code-Review, Signed-Releases) depend on
# repository settings that this workflow cannot set on a freshly instantiated
# repo. See the "Post-setup security" section in README.md for the manual
# steps required to lift the score to ~10/10.

on:
  branch_protection_rule:
  schedule:
    - cron: "30 1 * * 6"
  push:
    branches: [main]
  workflow_dispatch:

# Workflow-level least privilege; per-job overrides only widen where required.
permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The Scorecard action needs to upload SARIF (security-events: write) and
    # request a Sigstore signing identity (id-token: write).
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      # step-security/harden-runner@v2.19.1
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5
        with:
          egress-policy: audit

      # actions/checkout@v6.0.2
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Scorecard's Token-Permissions and Branch-Protection checks must not
          # be allowed to read the workflow's GITHUB_TOKEN; persist=false
          # ensures `.git/config` does not retain credentials after checkout.
          persist-credentials: false

      # ossf/scorecard-action@v2.4.3
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes to https://api.scorecard.dev so a public badge / external
          # consumers can read the score. Disable if this repository must stay
          # entirely private.
          publish_results: true

      # actions/upload-artifact@v7.0.1
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      # github/codeql-action/upload-sarif@v4.35.4
      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          sarif_file: results.sarif
