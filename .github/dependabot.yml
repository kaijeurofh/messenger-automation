version: 2
updates:
  # Keep pinned GitHub Actions SHAs fresh.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ["*"]

  # Keep Python dependencies (resolved by uv) up to date.
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  # Keep the devcontainer's Docker base images fresh. We pin `FROM` lines by
  # both tag and digest in `.devcontainer/Dockerfile`; Dependabot will open a
  # PR bumping both whenever the upstream tag's digest moves.
  - package-ecosystem: docker
    directory: "/.devcontainer"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    commit-message:
      prefix: build
      include: scope
