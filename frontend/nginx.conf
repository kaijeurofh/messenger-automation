server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static assets — fall back to index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse-proxy the backend so the frontend can call /api/* same-origin
  # and the browser never has to know the backend container name.
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Generation can take a while on a local model — give it room.
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
  }
}
