<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Euro-FH Messenger PoC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-slate-100 text-slate-900 antialiased">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div>
          <h1 class="text-xl font-semibold">Euro-FH Messenger</h1>
          <p class="text-sm text-slate-500">
            Lokaler PoC &middot; Lernorganisations-Nachrichten via Ollama
          </p>
        </div>
        <div class="text-right text-xs text-slate-500">
          <div>Modell: <span id="model-name" class="font-mono">…</span></div>
          <div>Ollama: <span id="ollama-url" class="font-mono">…</span></div>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-6 grid grid-cols-12 gap-6">
      <!-- Sidebar: students -->
      <aside class="col-span-12 md:col-span-4 lg:col-span-3 space-y-3">
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="font-semibold">Studis</h2>
            <button
              id="btn-generate"
              class="text-xs bg-slate-900 text-white rounded px-2 py-1 hover:bg-slate-700"
            >
              + zufällig
            </button>
          </div>
          <p class="text-xs text-slate-500 mb-3">
            Fünf kuratierte Profile + frisch generierte.
          </p>
          <ul id="student-list" class="space-y-1 max-h-[60vh] overflow-y-auto"></ul>
        </div>
      </aside>

      <!-- Center: student detail + trigger -->
      <section class="col-span-12 md:col-span-8 lg:col-span-5 space-y-4">
        <div id="student-detail" class="bg-white rounded-lg shadow p-5">
          <p class="text-slate-500 text-sm">
            Wähle links eine Studierende oder einen Studierenden aus.
          </p>
        </div>

        <div
          id="trigger-panel"
          class="bg-white rounded-lg shadow p-5 hidden"
        >
          <h3 class="font-semibold mb-3">Nachricht erzeugen</h3>
          <div class="flex flex-col gap-3">
            <label class="text-sm">
              Trigger
              <select
                id="trigger-select"
                class="mt-1 block w-full border border-slate-300 rounded px-2 py-1.5"
              ></select>
            </label>
            <button
              id="btn-generate-message"
              class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded px-3 py-2"
            >
              Nachricht generieren
            </button>
            <p id="generate-status" class="text-sm text-slate-500"></p>
          </div>
        </div>
      </section>

      <!-- Right: WhatsApp-style preview -->
      <section class="col-span-12 lg:col-span-4">
        <div class="bg-emerald-50 rounded-lg shadow p-4 sticky top-4">
          <h3 class="font-semibold mb-3 flex items-center gap-2">
            <span class="inline-block w-2 h-2 bg-emerald-500 rounded-full"></span>
            WhatsApp-Vorschau (simuliert)
          </h3>
          <div
            id="chat-area"
            class="bg-[url('https://i.imgur.com/abc.png')] bg-emerald-50 rounded-md p-3 min-h-[60vh] space-y-2 overflow-y-auto"
          ></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
